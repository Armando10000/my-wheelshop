<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheel Shop - Home</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Wheels</a></li>
          <li><a href="cart.html">Cart</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <img
          src="images/hero-wheels.jpg"
          alt="Beautiful car wheels collection"
          class="hero-image"
        />
        <div class="hero-text">
          <h1>Welcome to Cool Wheels</h1>
          <p>Your #1 source for premium car wheels</p>
          <a href="products.html" class="shop-now-btn">Shop Now</a>
        </div>
      </section>

      <!-- Featured wheels section-->

      <section class="featured">
        <h2>Featured Wheels</h2>
        <div class="product-grid">
          <!-- Featured Products -->
          <div class="product-card">
            <img
              src="images/wheel1.jpg"
              alt="BBS LM Wheels"
              class="product-image"
            />
            <h3>BBS LM</h3>
            <p class="price">€299</p>
            <button class="add-to-cart" data-id="1">Add to cart</button>
            <a href="product.html?id=1" class="details-link">View Details</a>
          </div>
          <!-- Featured Product 2 -->
          <div class="product-card">
            <img
              src="images/wheel6.jpg"
              alt="Volk Racing TE37"
              class="product-image"
            />
            <h3>Volk Racing TE37</h3>
            <p class="price">€449</p>
            <button class="add-to-cart" data-id="6">Add to Cart</button>
            <a href="product.html?id=6" class="details-link">View Details</a>
          </div>

          <!-- Featured Product 3 -->
          <div class="product-card">
            <img
              src="images/wheel3.jpg"
              alt="Enkei RPF1"
              class="product-image"
            />
            <h3>Enkei RPF1</h3>
            <p class="price">€349</p>
            <button class="add-to-cart" data-id="3">Add to Cart</button>
            <a href="product.html?id=3" class="details-link">View Details</a>
          </div>

          <!-- Featured Product 4 -->
          <div class="product-card">
            <img
              src="images/wheel8.jpg"
              alt="Method Race Wheels"
              class="product-image"
            />
            <h3>Method Race Wheels</h3>
            <p class="price">€249</p>
            <button class="add-to-cart" data-id="8">Add to Cart</button>
            <a href="product.html?id=8" class="details-link">View Details</a>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Cool Wheels</p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
